<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>THE STRIKE — loader (tagline, v2)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,100..900,0..100;1,9..144,100..900,0..100&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     THE STRIKE v2 — the loader, on the tagline (not the name).
     the headline is printed WORD BY WORD — three heavy strikes,
     each rippling out — then it settles in place as the hero and
     the page builds around it. no name, no fly-away: the words you
     watch get struck ARE the page. autoplays; REPLAY top-right.
     ============================================================ */
  :root {
    --booth: #0C0B08; --stone: #DDDBD4; --sheet: #E6E4DC; --ink: #16150F;
    --pencil: #C7361F; --accent: #2A2AF0; --accent-lum: #7C7CFF; --acid: #B4C400;
    --mono: "Space Mono", monospace; --frame: 2.2vw;
    --ease-out: cubic-bezier(0.19, 1, 0.22, 1);
    --ease-thunk: cubic-bezier(0.3, 1.6, 0.55, 1);
    --bg: var(--booth); --fg: var(--stone);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: "Fraunces", Georgia, serif; font-optical-sizing: auto;
    overflow: hidden; -webkit-font-smoothing: antialiased;
    transition: background-color 0.65s var(--ease-out), color 0.65s var(--ease-out);
  }
  .mono { font-family: var(--mono); }

  .glow {
    position: fixed; inset: -25vh -25vw; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse 58vw 60vh at 50% 48%,
      rgba(228,221,201,0.11), rgba(228,221,201,0.03) 52%, transparent 74%);
    opacity: 0; transition: opacity 0.7s var(--ease-out);
  }
  body.lit .glow { opacity: 1; }
  body.page .glow { opacity: 0; }

  /* the shake wrapper — the whole sheet takes each blow */
  #shake { position: fixed; inset: 0; z-index: 4; transform-origin: 50% 50%; }
  #shake.flex { animation: flex 0.46s cubic-bezier(0.2,0.9,0.3,1); }
  @keyframes flex {
    0% { transform: scale(1,1) translateY(0); }
    9% { transform: scale(1.012, 0.955) translateY(6px); }   /* the sheet slams down */
    26% { transform: scale(0.994, 1.012) translateY(-3px); }
    48% { transform: scale(1.002, 0.997) translateY(1px); }
    100% { transform: scale(1,1) translateY(0); }
  }

  /* ---- make-ready readout ---- */
  .readout {
    position: fixed; z-index: 8; right: var(--frame); top: 50%; transform: translateY(-50%);
    text-align: right; font-family: var(--mono);
    opacity: 0; transition: opacity 0.45s var(--ease-out), transform 0.5s var(--ease-out);
  }
  body.lit .readout { opacity: 1; }
  body.page .readout { opacity: 0; transform: translateY(calc(-50% - 30px)); }
  .readout .lbl { display: block; font-size: 9px; letter-spacing: 0.34em; opacity: 0.5; }
  .readout .num { display: block; font-size: 40px; font-weight: 700; line-height: 1.15; }
  .readout .num em { font-style: normal; font-size: 19px; opacity: 0.5; }
  .readout .st { display: block; font-size: 10px; letter-spacing: 0.16em; color: var(--pencil); min-height: 1.3em; }
  .readout .st.ok { color: var(--acid); }

  /* ---- gate: crop-brackets → page frame ---- */
  .bk { position: fixed; z-index: 7; width: 72px; height: 72px; border: 0 solid currentColor; pointer-events: none; opacity: 0; transition: transform 0.8s var(--ease-out), opacity 0.5s var(--ease-out); }
  body.lit .bk { opacity: 0.7; } body.page .bk { opacity: 0.6; }
  .bk.tl { top: var(--frame); left: var(--frame); border-top-width: 1.4px; border-left-width: 1.4px; }
  .bk.tr { top: var(--frame); right: var(--frame); border-top-width: 1.4px; border-right-width: 1.4px; }
  .bk.bl { bottom: var(--frame); left: var(--frame); border-bottom-width: 1.4px; border-left-width: 1.4px; }
  .bk.br { bottom: var(--frame); right: var(--frame); border-bottom-width: 1.4px; border-right-width: 1.4px; }

  .regwrap { position: fixed; z-index: 6; left: 50%; top: 22vh; width: 40px; height: 40px; margin: -20px 0 0 -20px; opacity: 0; transition: opacity 0.4s; }
  body.lit .regwrap { opacity: 0.8; } body.page .regwrap { opacity: 0; }
  .regwrap svg { width: 100%; height: 100%; overflow: visible; }
  .reg-ink { stroke: currentColor; stroke-width: 1.1; fill: none; stroke-dasharray: 120; stroke-dashoffset: 120; }
  body.drawn .reg-ink { transition: stroke-dashoffset 0.7s var(--ease-out); stroke-dashoffset: 0; }

  .tonebar { position: fixed; z-index: 6; left: 50%; top: calc(22vh + 34px); transform: translateX(-50%); display: flex; gap: 4px; }
  .tonebar i { width: 15px; height: 12px; display: block; opacity: 0; transform: translateY(-4px); transition: opacity 0.3s var(--ease-out), transform 0.3s var(--ease-out); }
  body.page .tonebar { opacity: 0; transition: opacity 0.3s; }

  /* ---- the headline: struck word by word; then it IS the hero ---- */
  .stage {
    position: fixed; z-index: 5; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: min(92vw, 1100px); text-align: center;
  }
  .eyebrow {
    font-family: var(--mono); font-size: clamp(0.55rem, 0.82vw, 0.7rem); letter-spacing: 0.28em;
    margin-bottom: 1.5rem; color: var(--fg); opacity: 0; transition: opacity 0.6s var(--ease-out) 0.15s;
  }
  .eyebrow em { font-style: normal; color: var(--accent-lum); }
  body.page .eyebrow { opacity: 0.72; color: var(--ink); }
  body.page .eyebrow em { color: var(--accent); }
  .hl {
    font-weight: 480; font-variation-settings: "opsz" 144;
    font-size: clamp(3rem, 12vw, 14rem); line-height: 0.84; letter-spacing: -0.035em;
  }
  .hl .w {
    display: block; color: transparent;
    /* blind emboss on the dark booth — pressed in, uninked */
    text-shadow: -1px -1px 0 rgba(221,219,212,0.28), 1.5px 1.5px 1px rgba(0,0,0,0.8);
    opacity: 0;
  }
  body.lit .hl .w { opacity: 1; transition: opacity 0.35s var(--ease-out); }
  /* struck: the ink floods the word (cream on booth) */
  .hl .w.struck {
    color: var(--fg);
    text-shadow: 0 0 0 var(--pencil), 0 0 0 var(--accent-lum);
    transition: color 0.13s var(--ease-out), text-shadow 0.38s var(--ease-thunk);
  }
  .hl .w.hit { text-shadow: -0.055em 0.02em 0 var(--pencil), 0.05em -0.016em 0 var(--accent-lum); }
  .hl .amp { font-style: italic; font-weight: 340; }
  body.struck-3 .hl .amp, body.page .hl .amp { color: var(--accent-lum); }
  /* the flood: the struck headline becomes the page, ink on stone */
  body.page .hl .w { color: var(--ink); text-shadow: none; }
  body.page .hl .amp { color: var(--accent); }

  /* ripple rings (spawned per strike) */
  .ring { position: fixed; z-index: 5; border-radius: 50%; border: 2px solid rgba(221,219,212,0.55); pointer-events: none; opacity: 0; transform: translate(-50%,-50%) scale(0.15); }
  .ring.go { animation: ring 0.72s cubic-bezier(0.12,0.7,0.25,1) forwards; }
  @keyframes ring { 0% { opacity: 0.85; transform: translate(-50%,-50%) scale(0.15); border-width: 4px; } 100% { opacity: 0; transform: translate(-50%,-50%) scale(30); border-width: 0.2px; } }
  .dust { position: fixed; z-index: 5; width: 3px; height: 3px; background: rgba(221,219,212,0.75); border-radius: 50%; pointer-events: none; opacity: 0; }
  .dust.go { animation: dust 0.8s var(--ease-out) forwards; }
  @keyframes dust { 0% { opacity: 0.95; transform: translate(-50%,-50%); } 100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.2); } }
  .flash { position: fixed; inset: 0; z-index: 6; pointer-events: none; opacity: 0; }
  .flash.go { animation: flash 0.32s var(--ease-out) forwards; }
  @keyframes flash { 0% { opacity: 0; } 10% { opacity: 0.8; } 100% { opacity: 0; } }

  /* page furniture on the flood */
  .furniture { opacity: 0; transition: opacity 0.6s var(--ease-out) 0.25s; }
  body.page .furniture { opacity: 1; }
  .corner { position: fixed; z-index: 8; font-family: var(--mono); font-size: 10px; letter-spacing: 0.24em; color: var(--ink); opacity: 0.66; }
  .corner.tl { top: calc(var(--frame) + 2px); left: calc(var(--frame) + 22px); }
  .corner.br { bottom: calc(var(--frame) + 2px); right: calc(var(--frame) + 22px); }
  .jobline { position: fixed; left: 0; right: 0; bottom: 0; z-index: 8; background: color-mix(in srgb, var(--stone) 88%, var(--ink)); border-top: 1px solid rgba(22,21,15,0.16); display: flex; justify-content: space-between; gap: 16px; padding: 8px 18px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: rgba(22,21,15,0.66); white-space: nowrap; }
  .jobline b { font-weight: 400; color: var(--pencil); } .jobline em { font-style: normal; color: var(--accent); }

  .cap { position: fixed; z-index: 20; left: calc(var(--frame) + 18px); bottom: calc(var(--frame) + 12px); font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: var(--fg); opacity: 0.5; }
  body.page .cap { color: var(--ink); } .cap b { font-weight: 700; }
  .replay { position: fixed; z-index: 20; right: var(--frame); top: calc(var(--frame) + 2px); font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: var(--ink); background: none; border: 1px solid rgba(22,21,15,0.4); padding: 7px 12px 6px; cursor: pointer; opacity: 0; transition: opacity 0.5s, background-color 0.2s, color 0.2s; }
  body.page .replay { opacity: 0.8; }
  .replay:hover { background: var(--ink); color: var(--stone); }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
  @media (max-width: 640px) { .readout { top: auto; bottom: 18vh; right: 50%; transform: translateX(50%); text-align: center; } .cap { display: none; } .hl { font-size: clamp(2.6rem, 15vw, 5rem); } }
</style>
</head>
<body>

  <div class="glow" aria-hidden="true"></div>

  <div class="readout" aria-hidden="true">
    <span class="lbl">MAKE-READY</span>
    <span class="num"><span id="num">00</span><em>%</em></span>
    <span class="st" id="st">SETTING THE FORME</span>
  </div>

  <i class="bk tl" id="bk-tl"></i><i class="bk tr" id="bk-tr"></i>
  <i class="bk bl" id="bk-bl"></i><i class="bk br" id="bk-br"></i>

  <div class="regwrap" aria-hidden="true"><svg viewBox="0 0 40 40"><circle class="reg-ink" cx="20" cy="20" r="11"/><path class="reg-ink" d="M20 2v11M20 27v11M2 20h11M27 20h11"/></svg></div>
  <div class="tonebar" id="tonebar" aria-hidden="true">
    <i style="background:#16150F"></i><i style="background:rgba(22,21,15,.55)"></i>
    <i style="background:#C7361F"></i><i style="background:#7C7CFF"></i>
    <i style="background:#B4C400"></i><i style="background:#E6E4DC"></i>
  </div>

  <div id="shake">
    <div class="stage">
      <p class="eyebrow mono">( ONE-PERSON PRACTICE — <em>EST. 2019</em> )</p>
      <h1 class="hl" aria-label="Code, design & nerve">
        <span class="w" id="w1">Code,</span>
        <span class="w" id="w2">design</span>
        <span class="w" id="w3"><span class="amp">&amp;</span>&nbsp;nerve</span>
      </h1>
    </div>
  </div>

  <div class="flash" id="flash" aria-hidden="true"></div>

  <div class="furniture" aria-hidden="true">
    <span class="corner tl">MARK AXELUS</span>
    <span class="corner br">SEE THE MESS</span>
    <div class="jobline">
      <span>SHEET Nº 001 · MARK AXELUS · WORKING PROOF</span>
      <span><b>STRUCK</b> · <em>IN REGISTER</em> · D50 5000K</span>
    </div>
  </div>

  <span class="cap">LOAD — <b>THE STRIKE</b> · printed, one word at a time</span>
  <button class="replay" id="replay" type="button">&#8630; REPLAY</button>

<script>
  var body = document.body;
  var numEl = document.getElementById("num");
  var stEl = document.getElementById("st");
  var shakeEl = document.getElementById("shake");
  var flashEl = document.getElementById("flash");
  var toneEls = document.querySelectorAll("#tonebar i");
  var words = [document.getElementById("w1"), document.getElementById("w2"), document.getElementById("w3")];
  var reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;

  var timers = [], rafId = null;
  function at(ms, fn) { timers.push(setTimeout(fn, ms)); }
  function clearAll() { timers.forEach(clearTimeout); timers = []; cancelAnimationFrame(rafId); }

  var countTo = 0, countCur = 0;
  function counter() {
    countCur += (countTo - countCur) * 0.16;
    if (Math.abs(countTo - countCur) < 0.4) countCur = countTo;
    var v = Math.round(countCur);
    numEl.textContent = (v < 10 ? "0" : "") + v;
    rafId = requestAnimationFrame(counter);
  }

  function seatBrackets() {
    var g = document.querySelector(".stage").getBoundingClientRect();
    var pad = 34, bk = 72, vw = innerWidth, vh = innerHeight, fr = 0.022 * vw;
    var pts = { "bk-tl":[g.left-pad,g.top-pad], "bk-tr":[g.right+pad-bk,g.top-pad],
                "bk-bl":[g.left-pad,g.bottom+pad-bk], "bk-br":[g.right+pad-bk,g.bottom+pad-bk] };
    var hm = { "bk-tl":[fr,fr], "bk-tr":[vw-fr-bk,fr], "bk-bl":[fr,vh-fr-bk], "bk-br":[vw-fr-bk,vh-fr-bk] };
    Object.keys(pts).forEach(function (id) { document.getElementById(id).style.transform = "translate(" + (pts[id][0]-hm[id][0]) + "px," + (pts[id][1]-hm[id][1]) + "px)"; });
  }
  function releaseBrackets() { ["bk-tl","bk-tr","bk-bl","bk-br"].forEach(function (id){ document.getElementById(id).style.transform = "translate(0,0)"; }); }

  /* a heavy strike at (cx,cy): 3 rings + a burst of dust + flash + shake */
  function ripple(cx, cy, power) {
    for (var k = 0; k < 3; k++) {
      (function (k) {
        setTimeout(function () {
          var r = document.createElement("span");
          r.className = "ring";
          var d0 = 30 + k * 22;
          r.style.left = cx + "px"; r.style.top = cy + "px";
          r.style.width = d0 + "px"; r.style.height = d0 + "px";
          document.body.appendChild(r);
          void r.offsetWidth; r.classList.add("go");
          setTimeout(function () { r.remove(); }, 760);
        }, k * 70);
      })(k);
    }
    for (var i = 0; i < 22; i++) {
      var d = document.createElement("span");
      d.className = "dust";
      var a = Math.random() * Math.PI * 2, rr = 70 + Math.random() * 230 * power;
      d.style.left = cx + "px"; d.style.top = cy + "px";
      d.style.setProperty("--dx", Math.cos(a) * rr + "px");
      d.style.setProperty("--dy", (Math.sin(a) * rr - 40) + "px");
      document.body.appendChild(d);
      void d.offsetWidth; d.classList.add("go");
      (function (el) { setTimeout(function () { el.remove(); }, 850); })(d);
    }
    flashEl.classList.remove("go"); void flashEl.offsetWidth; flashEl.classList.add("go");
    shakeEl.classList.remove("flex"); void shakeEl.offsetWidth; shakeEl.classList.add("flex");
  }

  function strikeWord(i) {
    var w = words[i];
    var r = w.getBoundingClientRect();
    ripple(r.left + r.width / 2, r.top + r.height / 2, 1 + i * 0.15);
    w.classList.add("struck", "hit");
    at(40, function () { w.classList.remove("hit"); });
    countTo = Math.round((i + 1) / 3 * 100);
    if (i === 2) { body.classList.add("struck-3"); stEl.textContent = "STRUCK — IN REGISTER"; stEl.classList.add("ok"); }
    else stEl.textContent = "STRIKING — PASS " + (i + 1) + "/3";
  }

  function toPage() {
    body.classList.add("page");
    body.style.setProperty("--bg", "var(--stone)");
    body.style.setProperty("--fg", "var(--ink)");
    releaseBrackets();
  }

  function play() {
    clearAll();
    ["lit","drawn","struck-3","page"].forEach(function (c) { body.classList.remove(c); });
    body.style.setProperty("--bg", "var(--booth)");
    body.style.setProperty("--fg", "var(--stone)");
    numEl.textContent = "00"; countTo = 0; countCur = 0;
    stEl.textContent = "SETTING THE FORME"; stEl.classList.remove("ok");
    words.forEach(function (w) { w.classList.remove("struck", "hit"); });
    toneEls.forEach(function (t) { t.style.opacity = ""; t.style.transform = ""; });
    void body.offsetWidth;
    seatBrackets();

    if (reduce) {
      body.classList.add("lit","drawn","struck-3");
      words.forEach(function (w) { w.classList.add("struck"); });
      countTo = 100; countCur = 100; numEl.textContent = "100";
      stEl.textContent = "STRUCK — IN REGISTER"; stEl.classList.add("ok");
      toPage();
      return;
    }

    rafId = requestAnimationFrame(counter);
    at(60,  function () { body.classList.add("lit"); });
    at(240, function () { body.classList.add("drawn"); });
    toneEls.forEach(function (t, i) { at(420 + i * 60, function () { t.style.opacity = "0.9"; t.style.transform = "translateY(0)"; }); });
    /* three heavy strikes, one per word, building the headline */
    at(1000, function () { strikeWord(0); });
    at(1440, function () { strikeWord(1); });
    at(1880, function () { strikeWord(2); });
    /* a beat of stillness after the last blow, then the page builds */
    at(2520, toPage);
  }

  document.getElementById("replay").addEventListener("click", play);
  addEventListener("resize", function () { if (!body.classList.contains("page")) seatBrackets(); });
  play();
</script>
</body>
</html>
