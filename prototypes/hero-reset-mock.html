<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero re-set — mock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{ --stone:#DDDBD4; --ink:#16150F; --accent:#2A2AF0; --hair:rgba(22,21,15,.16); }
  *{ box-sizing:border-box; margin:0; }
  html,body{ height:100%; }
  body{
    background:var(--stone); color:var(--ink);
    font-family:"Space Mono",monospace;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; overflow:hidden; cursor:pointer; user-select:none;
    padding:6vh 4vw;
  }
  /* faint proof furniture */
  .frame{ position:fixed; inset:18px; border:1px solid var(--hair); pointer-events:none; }
  .lab{ position:fixed; font-size:11px; letter-spacing:.14em; color:rgba(22,21,15,.5); text-transform:uppercase; }
  .lab.tl{ top:28px; left:30px; } .lab.tr{ top:28px; right:30px; }
  .lab.bot{ bottom:28px; left:0; right:0; text-align:center; }

  .stage{ position:relative; width:min(1100px,92vw); }
  #line{
    position:relative; width:100%;
    height:clamp(170px,32vh,320px);
  }
  #measure{ position:absolute; left:0; top:0; white-space:nowrap; visibility:hidden; pointer-events:none; }

  .g,.mg{
    font-family:"Fraunces",serif;
    font-size:calc(clamp(2.6rem,9.2vw,7.2rem) * var(--fs,1));
    font-variation-settings:"opsz" 144,"wght" 470,"SOFT" 0,"WONK" 0;
    line-height:1;
  }
  .mg{ position:static; }
  .g{
    position:absolute; left:0; top:0; transform:translate(0,0);
    transition:transform .82s cubic-bezier(.2,.9,.25,1), opacity .55s ease,
               font-size .82s cubic-bezier(.2,.9,.25,1);
    will-change:transform,opacity;
  }
  .amp{
    font-style:italic; color:var(--accent);
    font-variation-settings:"opsz" 144,"wght" 420,"SOFT" 0,"WONK" 1;
  }
  .g.amp .ampin{ display:inline-block; }
  .g.amp.hit .ampin{ animation:amppulse .52s ease; }
  @keyframes amppulse{ 0%{transform:scale(1)} 34%{transform:scale(1.16)} 100%{transform:scale(1)} }

  /* the desk line — same size as the name, ragged under it (the asymmetry IS the rag) */
  #line2{
    font-family:"Fraunces",serif;
    font-size:calc(clamp(2.6rem,9.2vw,7.2rem) * var(--fs,1));
    font-variation-settings:"opsz" 144,"wght" 470,"SOFT" 0,"WONK" 0;
    line-height:1; color:var(--ink); text-align:left;
  }

  /* the case: where thrown sorts return */
  .case{ position:relative; width:min(1100px,92vw); margin-top:6px; border-top:1px solid var(--hair); }
  .case span{ position:absolute; top:8px; right:0; font-size:11px; letter-spacing:.14em; color:rgba(22,21,15,.4); text-transform:uppercase; }

  .cap{ margin-top:34px; font-size:12px; letter-spacing:.16em; color:rgba(22,21,15,.55); text-transform:uppercase; text-align:center; }
  .hint{ margin-top:10px; font-size:11px; letter-spacing:.1em; color:rgba(22,21,15,.38); text-transform:uppercase; text-align:center; }
</style>
</head>
<body>
  <div class="frame"></div>
  <div class="lab tl">Hero re-set · mock</div>
  <div class="lab tr" id="counter">the front</div>

  <div class="stage">
    <div id="line"></div>
    <div id="line2">From the desk</div>
    <div id="measure" aria-hidden="true"></div>
  </div>
  <div class="case"><span>the case — sorts return here</span></div>

  <div class="cap">the lockup &mdash; name, mark &amp; address &middot; same size, set ragged</div>
  <div class="hint">the &amp; is the Et-ligature &mdash; a device, not an "and"</div>

<script>
  // ── SWAP THESE FREELY. Keep an & in each. ────────────────────────────
  const PHRASES = [
    // THE LOCKUP (Mark's pitch, set ragged): name + his mark, then the address.
    // The Fraunces italic & is the historic Et-ligature — it reads as a device,
    // not "and", so the line is a wordmark, never an unfinished sentence.
    // Both lines same size; the short-over-long rag IS the asymmetry.
    "Mark &"
  ];
  const AMP_ANCHOR = false;   // left-set lockup — no centring, the rag does the work
  // ─────────────────────────────────────────────────────────────────────

  const line = document.getElementById('line');
  const measure = document.getElementById('measure');
  const counter = document.getElementById('counter');
  let cur = [];            // [{char, el}]
  let yc = 0, i = 0, timer = null;

  function measurePass(text){
    measure.textContent = '';
    const els = [];
    for(const ch of text){
      const s = document.createElement('span');
      s.className = 'mg' + (ch === '&' ? ' amp' : '');
      if(ch === ' ') s.innerHTML = '&nbsp;'; else s.textContent = ch;
      measure.appendChild(s);
      els.push({ ch, s });
    }
    const mLeft = measure.getBoundingClientRect().left;
    const glyphH = els.length ? els[0].s.getBoundingClientRect().height : 0;
    const centre = line.clientWidth / 2;
    const textW = measure.getBoundingClientRect().width;
    let ampC = textW / 2;                     // no & (or anchor off) → centre the whole line
    const amp = AMP_ANCHOR && els.find(e => e.ch === '&');
    if(amp){ const r = amp.s.getBoundingClientRect(); ampC = (r.left - mLeft) + r.width / 2; }
    const shift = AMP_ANCHOR ? centre - ampC : 0;   // left-set when the anchor is off
    yc = (line.clientHeight - glyphH) / 2;
    const out = [];
    els.forEach(e => {
      if(e.ch === ' ') return;
      const r = e.s.getBoundingClientRect();
      out.push({ char: e.ch, x: (r.left - mLeft) + shift });
    });
    return { out, ampC, textW };
  }

  function measureTargets(text){
    // fit guard: the & is the anchor, so the longer arm must fit its half-box
    const root = document.documentElement;
    root.style.setProperty('--fs', 1);
    let m = measurePass(text);
    const half = line.clientWidth / 2 - 14;
    const arm = Math.max(m.ampC, m.textW - m.ampC);
    if(arm > half){
      root.style.setProperty('--fs', Math.max(0.4, half / arm));
      m = measurePass(text);
    }
    return m.out;
  }

  function makeSpan(ch){
    const el = document.createElement('span');
    el.className = 'g' + (ch === '&' ? ' amp' : '');
    if(ch === '&') el.innerHTML = '<i class="ampin">&amp;</i>'; else el.textContent = ch;
    line.appendChild(el);
    return el;
  }
  const place = (el, x, y, op) => {
    el.style.transform = 'translate(' + x + 'px,' + y + 'px)';
    if(op != null) el.style.opacity = op;
  };
  const pulse = el => { el.classList.remove('hit'); void el.offsetWidth; el.classList.add('hit'); };

  function render(text, animate){
    const targets = measureTargets(text);
    const pool = {};
    cur.forEach(o => { (pool[o.char] = pool[o.char] || []).push(o); });
    const used = new Set();
    const next = [];
    targets.forEach(t => {
      const list = pool[t.char];
      const avail = list && list.find(o => !used.has(o));
      if(avail){                                   // shared sort — glides to new slot
        used.add(avail);
        place(avail.el, t.x, yc, 1);
        if(t.char === '&') pulse(avail.el);
        next.push(avail);
      } else {                                     // fresh sort — drops in from the case
        const el = makeSpan(t.char);
        if(animate){
          place(el, t.x, yc - 120, 0);
          el.getBoundingClientRect();                      // commit the start state
          setTimeout(() => place(el, t.x, yc, 1), 30);     // timer, not rAF — survives throttled panes
        } else place(el, t.x, yc, 1);
        next.push({ char: t.char, el });
      }
    });
    cur.forEach(o => {                             // unused sort — thrown out, no one notices
      if(used.has(o)) return;
      const el = o.el;
      const m = /translate\(([-\d.]+)px/.exec(el.style.transform);
      const x = m ? parseFloat(m[1]) : 0;
      el.style.transform = 'translate(' + x + 'px,' + (yc + 170) + 'px) rotate(' + (Math.random() * 44 - 22) + 'deg)';
      el.style.opacity = 0;
      setTimeout(() => el.remove(), 760);
    });
    cur = next;
    // tuck the desk line right under the name — one display line-height apart
    const l2 = document.getElementById('line2');
    if(l2) l2.style.marginTop = (-yc + 4) + 'px';
  }

  function setCounter(){ counter.textContent = PHRASES.length > 1 ? (i === 0 ? 'a' : 'b') : 'the line'; }
  function advance(){ i = (i + 1) % PHRASES.length; render(PHRASES[i], true); setCounter(); }
  function loop(){ clearInterval(timer); timer = setInterval(advance, 3400); }

  (document.fonts ? document.fonts.ready : Promise.resolve()).then(() => {
    render(PHRASES[0], false);
    setCounter();
    loop();
  });
  addEventListener('click', () => { advance(); loop(); });
  addEventListener('keydown', e => { if(e.code === 'Space'){ e.preventDefault(); advance(); loop(); } });
  let rt; addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(() => render(PHRASES[i], false), 160); });
</script>
</body>
</html>
